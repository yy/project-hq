<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HQ</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --surface: #fff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --text-secondary: #666;
    --text-tertiary: #999;
    --accent: #2563eb;
    --col-active: #059669;
    --col-waiting: #d97706;
    --col-submitted: #7c3aed;
    --col-deferred: #6b7280;
    --col-done: #10b981;
    --col-dropped: #ef4444;
    --radius: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --panel-width: 520px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    padding: 20px 28px 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header .count {
    font-size: 13px;
    color: var(--text-tertiary);
    font-weight: 400;
  }

  .track-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    padding-bottom: 0;
  }

  .track-filter {
    position: relative;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    margin-bottom: -1px;
  }

  .track-filter:hover {
    color: var(--text-secondary);
  }

  .track-filter.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  .track-filter .filter-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
    position: relative;
    top: -0.5px;
  }

  .track-filter .filter-count {
    color: var(--text-tertiary);
    font-weight: 400;
    margin-left: 3px;
    font-size: 11px;
  }

  .board {
    display: flex;
    gap: 12px;
    padding: 20px 28px;
    overflow-x: auto;
    min-height: calc(100vh - 100px);
    align-items: stretch;
  }

  .column {
    flex: 0 0 260px;
    min-width: 260px;
    display: flex;
    flex-direction: column;
  }

  .column-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px 10px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
  }

  .column-header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .column-header .badge {
    font-weight: 500;
    color: var(--text-tertiary);
    font-size: 11px;
  }

  .column[data-status="active"] .dot { background: var(--col-active, #6b7280); }
  .column[data-status="waiting"] .dot { background: var(--col-waiting, #6b7280); }
  .column[data-status="submitted"] .dot { background: var(--col-submitted, #6b7280); }
  .column[data-status="deferred"] .dot { background: var(--col-deferred, #6b7280); }
  .column[data-status="done"] .dot { background: var(--col-done, #6b7280); }
  .column[data-status="dropped"] .dot { background: var(--col-dropped, #6b7280); }

  .column-body {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 60px;
    flex: 1;
    padding: 4px;
    border-radius: var(--radius);
    transition: background 0.15s;
  }

  .column-body.drag-over {
    background: rgba(37, 99, 235, 0.1);
    outline: 2px dashed rgba(37, 99, 235, 0.3);
    outline-offset: -2px;
    border-radius: var(--radius);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: grab;
    transition: box-shadow 0.15s, border-color 0.15s, opacity 0.15s;
    box-shadow: var(--shadow);
    border-left: 3px solid var(--border);
  }

  .card:hover {
    border-color: #ccc;
  }

  .card.dragging {
    opacity: 0.4;
  }

  .card.dimmed {
    opacity: 0.15;
    pointer-events: none;
  }

  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  body.panel-open .card:not(.selected) {
    opacity: 0.35;
    transition: opacity 0.2s;
  }

  body.panel-open .card.selected {
    box-shadow: 0 0 0 1px var(--accent), 0 2px 12px rgba(37, 99, 235, 0.15);
  }

  .drop-indicator {
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
    margin: -1px 4px;
    pointer-events: none;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .card-track {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 6px;
    line-height: 1.5;
  }

  .card-meta span {
    display: block;
  }

  .card-meta .deadline {
    color: var(--col-waiting);
    font-weight: 500;
  }

  /* --- Side panel --- */

  .panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
  }

  .panel-overlay.open {
    display: block;
  }

  .panel-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.08);
  }

  .panel {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: var(--panel-width);
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: -4px 0 24px rgba(0, 0, 0, 0.06);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.2s ease;
  }

  .panel-overlay.open .panel {
    transform: translateX(0);
  }

  .panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 20px 20px 0;
    gap: 12px;
  }

  .panel-header h2 {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    letter-spacing: -0.01em;
  }

  .panel-close {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    color: var(--text-tertiary);
    cursor: pointer;
    border-radius: 4px;
    font-size: 18px;
    line-height: 1;
  }

  .panel-close:hover {
    background: var(--bg);
    color: var(--text);
  }

  .panel-fields {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
  }

  .panel-field {
    min-width: 100px;
  }

  .panel-field-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-tertiary);
    margin-bottom: 2px;
  }

  .panel-field-value {
    font-size: 13px;
    color: var(--text);
  }

  .panel-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .panel-body-content {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-secondary);
    word-wrap: break-word;
  }

  .panel-body-content h1,
  .panel-body-content h2,
  .panel-body-content h3 {
    color: var(--text);
    margin: 16px 0 6px;
    line-height: 1.3;
  }

  .panel-body-content h1 { font-size: 16px; }
  .panel-body-content h2 { font-size: 14px; }
  .panel-body-content h3 { font-size: 13px; }

  .panel-body-content p { margin: 0 0 10px; }

  .panel-body-content ul,
  .panel-body-content ol {
    margin: 0 0 10px;
    padding-left: 20px;
  }

  .panel-body-content li { margin-bottom: 3px; }

  .panel-body-content code {
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 12px;
    background: var(--bg);
    padding: 1px 4px;
    border-radius: 3px;
  }

  .panel-body-content pre {
    background: var(--bg);
    padding: 10px;
    border-radius: var(--radius);
    overflow-x: auto;
    margin: 0 0 10px;
  }

  .panel-body-content pre code {
    background: none;
    padding: 0;
  }

  .panel-body-content a {
    color: var(--accent);
    text-decoration: none;
  }

  .panel-body-content a:hover { text-decoration: underline; }

  .panel-body-content blockquote {
    border-left: 3px solid var(--border);
    padding-left: 12px;
    color: var(--text-tertiary);
    margin: 0 0 10px;
  }

  .panel-body-empty {
    font-size: 13px;
    color: var(--text-tertiary);
    font-style: italic;
  }

  .panel-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .panel-btn {
    height: 28px;
    padding: 0 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    color: var(--text-tertiary);
    cursor: pointer;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }

  .panel-btn:hover {
    background: var(--bg);
    color: var(--text);
  }

  #panel-editor {
    display: none;
    width: 100%;
    flex: 1;
    min-height: 200px;
    resize: none;
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 13px;
    line-height: 1.6;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    color: var(--text);
    background: var(--surface);
    outline: none;
  }

  #panel-editor:focus {
    border-color: var(--accent);
  }

  .panel-edit-actions {
    display: none;
    gap: 8px;
    justify-content: flex-end;
    padding-top: 8px;
  }

  .panel-edit-actions button {
    height: 28px;
    padding: 0 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }

  .panel-edit-actions button:hover {
    background: var(--bg);
  }

  .panel-edit-actions button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .panel-edit-actions button.primary:hover {
    opacity: 0.9;
  }

  .panel-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: "SF Mono", "Menlo", monospace;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--text);
    color: #fff;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show { opacity: 1; }

  .empty-state {
    font-size: 12px;
    color: var(--text-tertiary);
    padding: 16px 4px;
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>
  <header>
    <div class="header-top">
      <h1>HQ</h1>
      <span class="count" id="total-count"></span>
    </div>
    <div class="track-filters" id="track-filters"></div>
  </header>
  <div class="board" id="board"></div>

  <div class="panel-overlay" id="panel-overlay">
    <div class="panel-backdrop" id="panel-backdrop"></div>
    <div class="panel">
      <div class="panel-header">
        <h2 id="panel-title"></h2>
        <div class="panel-actions">
          <a class="panel-btn" id="panel-obsidian" title="Open in Obsidian">Obsidian</a>
          <button class="panel-btn" id="panel-edit-btn" title="Edit">Edit</button>
          <button class="panel-close" id="panel-close">&times;</button>
        </div>
      </div>
      <div class="panel-fields" id="panel-fields"></div>
      <div class="panel-body">
        <div id="panel-content"></div>
        <textarea id="panel-editor"></textarea>
        <div class="panel-edit-actions" id="panel-edit-actions">
          <button id="panel-cancel-btn">Cancel</button>
          <button id="panel-save-btn" class="primary">Save</button>
        </div>
      </div>
      <div class="panel-footer" id="panel-file"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const TRACK_PALETTE = [
  "#6366f1", "#0891b2", "#ca8a04", "#dc2626", "#059669",
  "#9333ea", "#e11d48", "#2563eb", "#c2410c", "#4f46e5",
];

let statuses = [];
let projects = [];
let activeTrack = null;
let trackColorMap = {};
let dragFile = null;
let dragSourceStatus = null;
let selectedFile = null;
let didDrag = false;
let editMode = false;
let originalBody = '';
let hqDir = '';
let vaultName = '';

function assignTrackColors(tracks) {
  const sorted = [...tracks].sort();
  trackColorMap = {};
  sorted.forEach((t, i) => {
    trackColorMap[t] = TRACK_PALETTE[i % TRACK_PALETTE.length];
  });
}

async function fetchProjects() {
  const res = await fetch("/api/projects");
  const data = await res.json();
  statuses = data.statuses || statuses;
  projects = data.projects || [];
  if (data.hq_dir) {
    hqDir = data.hq_dir;
    vaultName = hqDir.split('/').pop();
  }

  const tracks = [...new Set(projects.map(p => p.track))];
  assignTrackColors(tracks);

  render();
}

function renderFilters() {
  const bar = document.getElementById("track-filters");
  bar.innerHTML = "";

  const tracks = [...new Set(projects.map(p => p.track))].sort();

  const allBtn = document.createElement("button");
  allBtn.className = "track-filter" + (activeTrack === null ? " active" : "");
  const allCount = projects.filter(p => p.status !== "done" && p.status !== "dropped").length;
  allBtn.innerHTML = `All<span class="filter-count">${allCount}</span>`;
  allBtn.addEventListener("click", () => { activeTrack = null; render(); });
  bar.appendChild(allBtn);

  for (const track of tracks) {
    const btn = document.createElement("button");
    btn.className = "track-filter" + (activeTrack === track ? " active" : "");
    const color = trackColorMap[track] || "#999";
    const count = projects.filter(p => p.track === track && p.status !== "done" && p.status !== "dropped").length;
    btn.innerHTML = `<span class="filter-dot" style="background:${color}"></span>${esc(track)}<span class="filter-count">${count}</span>`;
    btn.addEventListener("click", () => { activeTrack = track; render(); });
    bar.appendChild(btn);
  }
}

// --- Side panel ---

async function openPanel(file) {
  const p = projects.find(pr => pr.file === file);
  if (!p) return;

  selectedFile = file;
  render(); // re-render to show selected state on card

  document.getElementById("panel-title").textContent = p.title;
  document.getElementById("panel-file").textContent = p.file;

  // Build fields
  const fields = document.getElementById("panel-fields");
  fields.innerHTML = "";
  const fieldDefs = [
    ["Status", p.status],
    ["Track", p.track],
    ["Priority", p.priority],
    ["Owner", p.owner],
    ["Next action", p.my_next && p.my_next !== "(fill in)" ? p.my_next : ""],
    ["Waiting on", p.waiting_on],
    ["Deadline", p.deadline],
    ["Deferred until", p.deferred_until],
  ];
  for (const [label, value] of fieldDefs) {
    if (!value && value !== 0) continue;
    const div = document.createElement("div");
    div.className = "panel-field";
    div.innerHTML = `<div class="panel-field-label">${esc(label)}</div><div class="panel-field-value">${esc(String(value))}</div>`;
    fields.appendChild(div);
  }

  // Set Obsidian link
  const obsBtn = document.getElementById("panel-obsidian");
  const filePath = file.replace(/\.md$/, '');
  obsBtn.href = `obsidian://open?vault=${encodeURIComponent(vaultName)}&file=${encodeURIComponent(filePath)}`;

  // Fetch body content
  const content = document.getElementById("panel-content");
  content.innerHTML = '<span class="panel-body-empty">Loading...</span>';

  try {
    const res = await fetch("/api/project?file=" + encodeURIComponent(file));
    const data = await res.json();
    originalBody = data.body || '';
    renderBody(content, originalBody);
  } catch {
    content.className = "panel-body-empty";
    content.textContent = "Failed to load content.";
  }

  exitEditMode();
  document.getElementById("panel-overlay").classList.add("open");
  document.body.classList.add("panel-open");
}

function closePanel() {
  editMode = false;
  document.getElementById("panel-overlay").classList.remove("open");
  document.body.classList.remove("panel-open");
  selectedFile = null;
  render();
}

function enterEditMode() {
  editMode = true;
  const editor = document.getElementById("panel-editor");
  const content = document.getElementById("panel-content");
  const actions = document.getElementById("panel-edit-actions");
  const btn = document.getElementById("panel-edit-btn");

  editor.value = originalBody;
  content.style.display = "none";
  editor.style.display = "block";
  actions.style.display = "flex";
  btn.textContent = "Editing";
  editor.focus();
}

function exitEditMode() {
  editMode = false;
  const editor = document.getElementById("panel-editor");
  const content = document.getElementById("panel-content");
  const actions = document.getElementById("panel-edit-actions");
  const btn = document.getElementById("panel-edit-btn");

  editor.style.display = "none";
  actions.style.display = "none";
  content.style.display = "block";
  btn.textContent = "Edit";
}

const CHECKBOX_LINE_RE = /^\s*[-*+]\s+\[([ xX])\]\s/;

function checkboxLineIndices(body) {
  const indices = [];
  const lines = body.split('\n');
  for (let i = 0; i < lines.length; i++) {
    if (CHECKBOX_LINE_RE.test(lines[i])) indices.push(i);
  }
  return indices;
}

function renderBody(content, body) {
  if (!body) {
    content.className = "panel-body-empty";
    content.textContent = "No notes.";
    return;
  }
  content.className = "panel-body-content";
  content.innerHTML = marked.parse(body);

  const lineIndices = checkboxLineIndices(body);
  const inputs = content.querySelectorAll('input[type="checkbox"]');
  inputs.forEach((input, i) => {
    const lineIndex = lineIndices[i];
    if (lineIndex === undefined) return;
    input.disabled = false;
    input.style.cursor = "pointer";
    input.addEventListener("change", () => toggleCheckbox(input, lineIndex));
  });
}

async function toggleCheckbox(input, lineIndex) {
  const file = selectedFile;
  const expected = !input.checked;
  const checked = input.checked;
  input.disabled = true;
  try {
    const res = await fetch("/api/checkbox", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ file, line: lineIndex, expected, checked }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      input.checked = expected;
      toast("Error: " + (data.error || "Toggle failed"));
      return;
    }
    const lines = originalBody.split('\n');
    lines[lineIndex] = lines[lineIndex].replace(/\[[ xX]\]/, checked ? '[x]' : '[ ]');
    originalBody = lines.join('\n');
  } catch {
    input.checked = expected;
    toast("Toggle failed");
  } finally {
    input.disabled = false;
  }
}

async function saveBody() {
  const editor = document.getElementById("panel-editor");
  const body = editor.value;

  try {
    const res = await fetch("/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ file: selectedFile, body }),
    });
    const data = await res.json();
    if (!res.ok) {
      toast("Error: " + (data.error || "Save failed"));
      return;
    }
    originalBody = body;
    renderBody(document.getElementById("panel-content"), originalBody);
    exitEditMode();
    toast("Saved");
  } catch {
    toast("Save failed");
  }
}

document.getElementById("panel-edit-btn").addEventListener("click", () => {
  if (editMode) exitEditMode();
  else enterEditMode();
});
document.getElementById("panel-save-btn").addEventListener("click", saveBody);
document.getElementById("panel-cancel-btn").addEventListener("click", exitEditMode);

document.getElementById("panel-editor").addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "s") {
    e.preventDefault();
    saveBody();
  }
  if (e.key === "Escape") {
    e.stopPropagation();
    exitEditMode();
  }
});

document.getElementById("panel-backdrop").addEventListener("click", closePanel);
document.getElementById("panel-close").addEventListener("click", closePanel);
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && !editMode) closePanel();
});

// --- Drag-and-drop helpers ---

function getDropIndex(body, y) {
  const cards = [...body.querySelectorAll(".card")];
  for (let i = 0; i < cards.length; i++) {
    const rect = cards[i].getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (y < mid) return i;
  }
  return cards.length;
}

function clearIndicators(body) {
  body.querySelectorAll(".drop-indicator").forEach(el => el.remove());
}

function showIndicator(body, index) {
  clearIndicators(body);
  const indicator = document.createElement("div");
  indicator.className = "drop-indicator";
  const cards = [...body.querySelectorAll(".card")];
  if (index < cards.length) {
    body.insertBefore(indicator, cards[index]);
  } else {
    body.appendChild(indicator);
  }
}

function getColumnItems(status) {
  const items = projects
    .filter(p => p.status === status)
    .filter(p => !activeTrack || p.track === activeTrack);
  items.sort((a, b) => b.priority - a.priority);
  return items;
}

function computePriority(items, dropIndex, draggedFile) {
  const originalIndex = items.findIndex(p => p.file === draggedFile);
  const adjustedDropIndex = originalIndex !== -1 && originalIndex < dropIndex ? dropIndex - 1 : dropIndex;
  // Remove the dragged card from the list after adjusting the DOM-based drop index.
  const others = items.filter(p => p.file !== draggedFile);
  // above = card that will be above the drop position (higher priority)
  const above = others[adjustedDropIndex - 1];
  // below = card that will be below the drop position (lower priority)
  const below = others[adjustedDropIndex];

  if (above && below) {
    const mid = Math.round((above.priority + below.priority) / 2);
    // If no gap, nudge above the lower neighbor
    return mid !== below.priority ? mid : below.priority + 1;
  }
  if (above) return above.priority - 10;
  if (below) return below.priority + 10;
  return 50; // empty column
}

async function handleDrop(targetStatus, dropIndex) {
  if (!dragFile) return;

  const sameColumn = dragSourceStatus === targetStatus;
  const payload = { file: dragFile, to_status: targetStatus };

  if (sameColumn) {
    // Reorder: compute new priority based on neighbors
    const items = getColumnItems(targetStatus);
    payload.priority = computePriority(items, dropIndex, dragFile);
  }
  // Cross-column: keep existing priority, just change status

  const res = await fetch("/api/move", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });

  if (!res.ok) {
    const data = await res.json();
    toast("Error: " + (data.error || "Unknown"));
    return;
  }

  if (!sameColumn) toast("Moved to " + targetStatus);
  fetchProjects();
}

// --- Render ---

function render() {
  renderFilters();

  const board = document.getElementById("board");
  board.innerHTML = "";

  const visible = activeTrack ? projects.filter(p => p.track === activeTrack) : projects;
  const nonTerminal = visible.filter(p => p.status !== "done" && p.status !== "dropped");
  const label = activeTrack ? activeTrack : "active";
  document.getElementById("total-count").textContent = nonTerminal.length + " " + label;

  for (const status of statuses) {
    const allItems = projects.filter(p => p.status === status);
    allItems.sort((a, b) => b.priority - a.priority);
    const visibleItems = activeTrack ? allItems.filter(p => p.track === activeTrack) : allItems;

    const col = document.createElement("div");
    col.className = "column";
    col.dataset.status = status;

    col.innerHTML = `
      <div class="column-header">
        <span class="dot"></span>
        ${status}
        <span class="badge">${visibleItems.length}</span>
      </div>
    `;

    const body = document.createElement("div");
    body.className = "column-body";
    body.dataset.status = status;

    body.addEventListener("dragover", e => {
      e.preventDefault();
      if (dragSourceStatus === status) {
        // Same column: show precise drop indicator
        clearIndicators(body);
        body.classList.remove("drag-over");
        const idx = getDropIndex(body, e.clientY);
        showIndicator(body, idx);
      } else {
        // Cross column: highlight whole column
        clearIndicators(body);
        body.classList.add("drag-over");
      }
    });

    body.addEventListener("dragleave", e => {
      if (!body.contains(e.relatedTarget)) {
        clearIndicators(body);
        body.classList.remove("drag-over");
      }
    });

    body.addEventListener("drop", e => {
      e.preventDefault();
      clearIndicators(body);
      body.classList.remove("drag-over");
      const idx = getDropIndex(body, e.clientY);
      handleDrop(status, idx);
    });

    const rendered = activeTrack ? visibleItems : allItems;

    if (rendered.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No projects";
      body.appendChild(empty);
    }

    for (const p of rendered) {
      const color = trackColorMap[p.track] || "#999";
      const dimmed = activeTrack && p.track !== activeTrack;

      const card = document.createElement("div");
      card.className = "card" + (dimmed ? " dimmed" : "") + (selectedFile === p.file ? " selected" : "");
      card.style.borderLeftColor = color;
      card.draggable = !dimmed;
      card.dataset.file = p.file;

      card.addEventListener("mousedown", () => { didDrag = false; });

      card.addEventListener("dragstart", e => {
        didDrag = true;
        dragFile = p.file;
        dragSourceStatus = p.status;
        e.dataTransfer.setData("text/plain", p.file);
        e.dataTransfer.effectAllowed = "move";
        requestAnimationFrame(() => card.classList.add("dragging"));
      });

      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        dragFile = null;
        dragSourceStatus = null;
        document.querySelectorAll(".drop-indicator").forEach(el => el.remove());
      });

      card.addEventListener("click", () => {
        if (!didDrag) openPanel(p.file);
      });

      let meta = "";
      if (p.my_next && p.my_next !== "(fill in)") {
        meta += `<span>\u2192 ${esc(p.my_next)}</span>`;
      }
      if (p.waiting_on) {
        const days = p.waiting_since ? daysSince(p.waiting_since) : null;
        const dayStr = days !== null ? ` (${days}d)` : "";
        meta += `<span>Waiting on ${esc(p.waiting_on)}${dayStr}</span>`;
      }
      if (p.deadline) {
        meta += `<span class="deadline">Due ${esc(p.deadline)}</span>`;
      }
      if (p.deferred_until) {
        meta += `<span>Deferred until ${esc(p.deferred_until)}</span>`;
      }

      card.innerHTML = `
        <div class="card-track" style="color:${color}">${esc(p.track)}</div>
        <div class="card-title">${esc(p.title)}</div>
        ${meta ? `<div class="card-meta">${meta}</div>` : ""}
      `;

      body.appendChild(card);
    }

    col.appendChild(body);
    board.appendChild(col);
  }
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 2000);
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function daysSince(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const days = Math.floor((now - d) / 86400000);
  return days >= 0 ? days : null;
}

// SSE live reload
function connectSSE() {
  const es = new EventSource("/api/events");
  es.onmessage = () => fetchProjects();
  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

fetchProjects();
connectSSE();
</script>
